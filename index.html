<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="디자이너를 위한 RGB 색상 팔레트 도구">
    <meta name="theme-color" content="#ffffff">
    <title>Design Pick</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="improved.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">Design Pick</div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="picker">Color Picker</button>
            <button class="nav-tab" data-tab="inspiration">Inspiration</button>
            <button class="nav-tab" data-tab="colors">색 보기</button>
        </div>
    </nav>

    <!-- Color Picker Tab -->
    <div id="picker" class="tab-content active">
        <div class="wrapper">
            <div class="main">
                <!-- 색상 박스 -->
                <div class="color-box" id="colorDisplay"></div>

                <!-- 정보 패널 -->
                <div class="info-panel">
                    <!-- R, G, B 값 -->
                    <div class="rgb-values">
                        <div class="rgb-item" id="rItem">
                            <span class="rgb-label">R</span>
                            <span class="rgb-value" id="rValue">0</span>
                        </div>
                        <div class="rgb-item" id="gItem">
                            <span class="rgb-label">G</span>
                            <span class="rgb-value" id="gValue">0</span>
                        </div>
                        <div class="rgb-item" id="bItem">
                            <span class="rgb-label">B</span>
                            <span class="rgb-value" id="bValue">0</span>
                        </div>
                    </div>

                    <!-- 색상 이름 -->
                    <div class="color-name-display" id="colorNameDisplay"></div>

                    <!-- HEX -->
                    <div class="code-box">
                        <div class="code-item">
                            <span class="code-label">HEX</span>
                            <span class="code-value" id="hexValue">#000000</span>
                        </div>
                    </div>

                    <!-- 버튼 -->
                    <div class="button-section">
                        <button id="resetBtn" class="btn btn-reset">리셋</button>
                        <button id="hexCopyBtn" class="btn btn-copy">HEX 복사</button>
                        <button id="rgbCopyBtn" class="btn btn-copy">RGB 복사</button>
                    </div>

                    <!-- 모바일 미세조정 -->
                    <div class="mobile-adjust">
                        <p class="mobile-adj-label">미세 조정: <span id="mobileAdjLabel">채널 선택</span></p>
                        <div class="mobile-adj-btns">
                            <button class="adj-btn" onclick="app.mobileAdjust(-10)">−10</button>
                            <button class="adj-btn" onclick="app.mobileAdjust(-1)">−1</button>
                            <button class="adj-btn" onclick="app.mobileAdjust(1)">+1</button>
                            <button class="adj-btn" onclick="app.mobileAdjust(10)">+10</button>
                        </div>
                    </div>

                    <!-- 키보드 가이드 (데스크탑) -->
                    <div class="keyboard-guide desktop-only">
                        <p class="guide-title">조작 방법</p>
                        <p class="guide-text">R / G / B 클릭: 채널 선택</p>
                        <p class="guide-text">← →: 선택 채널 미세 조정</p>
                        <p class="guide-text">스페이스바: 룰렛 재시작</p>
                    </div>
                </div>
            </div>

            <!-- 색 계열 선택 -->
            <div class="family-section">
                <p class="family-section-title">색 계열 선택</p>
                <div class="family-chips" id="familyChips">
                    <button class="family-chip active" data-family="all" style="--chip-c:#555">전체</button>
                    <button class="family-chip" data-family="red"     style="--chip-c:#FF3B30">빨강</button>
                    <button class="family-chip" data-family="orange"  style="--chip-c:#FF9500">주황</button>
                    <button class="family-chip" data-family="yellow"  style="--chip-c:#FFCC00">노랑</button>
                    <button class="family-chip" data-family="green"   style="--chip-c:#34C759">초록</button>
                    <button class="family-chip" data-family="teal"    style="--chip-c:#32ADE6">청록</button>
                    <button class="family-chip" data-family="blue"    style="--chip-c:#007AFF">파랑</button>
                    <button class="family-chip" data-family="purple"  style="--chip-c:#AF52DE">보라</button>
                    <button class="family-chip" data-family="pink"    style="--chip-c:#FF2D55">분홍</button>
                    <button class="family-chip" data-family="neutral" style="--chip-c:#8E8E93">중립</button>
                </div>
            </div>

            <!-- 비슷한 색상 -->
            <div class="similar-colors-section">
                <p class="similar-title">비슷한 색상</p>
                <div class="similar-colors-list" id="similarColors"></div>
            </div>

            <!-- 색상 검색 -->
            <div class="color-search">
                <input
                    type="text"
                    id="colorInput"
                    class="color-input"
                    placeholder="색상 이름 검색 (예: 빨강, 민트, 파랑)"
                >
                <div class="search-results" id="searchResults"></div>
            </div>
        </div>
    </div>

    <!-- Design Inspiration Tab -->
    <div id="inspiration" class="tab-content inspo-tab">
        <div class="inspo-card" id="inspoCard">
            <!-- Prev -->
            <button class="inspo-nav-btn inspo-prev" id="inspoPrev" aria-label="이전">&#8249;</button>

            <!-- Text section -->
            <div class="inspo-text">
                <div class="inspo-number" id="inspoNumber">01</div>
                <p class="inspo-category" id="inspoCategory"></p>
                <h2 class="inspo-title" id="inspoTitle"></h2>
                <p class="inspo-desc" id="inspoDesc"></p>
            </div>

            <!-- Swatches -->
            <div class="inspo-swatches" id="inspoSwatches">
                <div class="inspo-swatch swatch-back" id="swatchBack"
                     onclick="app.inspoPickColor(0)">
                    <span class="sw-name" id="swNameBack"></span>
                    <span class="sw-hex"  id="swHexBack"></span>
                </div>
                <div class="inspo-swatch swatch-front" id="swatchFront"
                     onclick="app.inspoPickColor(1)">
                    <span class="sw-name" id="swNameFront"></span>
                    <span class="sw-hex"  id="swHexFront"></span>
                </div>
            </div>

            <!-- Next -->
            <button class="inspo-nav-btn inspo-next" id="inspoNext" aria-label="다음">&#8250;</button>
        </div>
    </div>


    <!-- Colors Tab -->
    <div id="colors" class="tab-content">
        <div class="wrapper">
            <div class="colors-wrapper">
                <h2>더 많은 색 보기</h2>
                <p class="colors-subtitle">용도별로 분류된 컬러 라이브러리</p>
                <div class="color-library-container">
                    <div class="color-library" id="colorLibrary"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
